<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel 快速匯入與動態配分轉換器</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { border-left: 5px solid var(--accent); padding-left: 10px; }
        .controls { display: flex; gap: 20px; align-items: center; margin-bottom: 20px; }
        textarea { width: 100%; height: 150px; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-family: monospace; }
        button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; }
        .btn-calc { background: var(--accent); }
        .btn-copy { background: #27ae60; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: #f8f9fa; }
    </style>
</head>
<body>

<div class="container">
    <h2>數據匯入與動態配分</h2>
    <div class="controls">
        <label>基本分數：<input type="number" id="baseScore" value="60" style="width: 60px;"></label>
    </div>
    <p>請將 Excel 的「姓名」與「星星數」兩欄數據直接貼入下方：</p>
    <textarea id="excelInput" placeholder="範例：&#10;王小明    35&#10;李小華    28"></textarea>
    <div style="margin-top: 15px;">
        <button class="btn-calc" onclick="processData()">一鍵計算分數</button>
        <button class="btn-copy" onclick="copyTable()">複製表格結果</button>
    </div>

    <table id="resultTable">
        <thead>
            <tr><th>姓名</th><th>基本分數</th><th>星星數</th><th>最終總分</th></tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>
</div>

<script>
    function processData() {
        const baseScore = parseFloat(document.getElementById('baseScore').value) || 60;
        const input = document.getElementById('excelInput').value.trim();
        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';

        // 1. 解析輸入數據
        const lines = input.split('\n');
        let students = [];
        let maxStars = 0;

        lines.forEach(line => {
            const parts = line.split(/\t|\s+/); // 支援 Tab 或 空格分隔
            if (parts.length >= 2) {
                const name = parts[0];
                const stars = parseFloat(parts[1]);
                if (!isNaN(stars)) {
                    students.push({ name, stars });
                    if (stars > maxStars) maxStars = stars;
                }
            }
        });

        if (students.length === 0) return alert('請確認貼入的格式是否正確！');
        if (maxStars === 0) return alert('星星數量不得全為 0');

        // 2. 動態計算邏輯
        // 剩餘可分配分數 = 99 - 基本分數
        const remainingPoints = 99 - baseScore;
        // 每顆星的分數值 = 剩餘分 / 最高星數
        const starValue = remainingPoints / maxStars;

        // 3. 計算每位學生的總分並顯示
        students.forEach(s => {
            // 公式：基本分 + (該生星星 * 星值)
            let total = baseScore + (s.stars * starValue);
            
            // 四捨五入並加入表格
            const row = `<tr>
                <td>${s.name}</td>
                <td>${baseScore}</td>
                <td>${s.stars}</td>
                <td>${Math.round(total)}</td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }

    function copyTable() {
        const table = document.getElementById('resultTable');
        const range = document.createRange();
        range.selectNode(table);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand('copy');
        alert('表格內容已複製到剪貼簿！');
    }
</script>

</body>
</html>
